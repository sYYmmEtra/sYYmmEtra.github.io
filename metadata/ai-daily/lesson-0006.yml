titleZh: 混合专家 MoE（稀疏激活与路由）
titleEn: "Mixture-of-Experts: Sparse Activation and Routing"
summaryZh: MoE把FFN换成N个专家FFN+路由器,token只走top-K→解耦总参(容量)与激活参(算力),671B只激活37B;路由=softmax(x·Wg)选topK加权和;核心痛点=路由塌方(正反馈致少数专家垄断)+容量上限致token dropping;均衡三代=辅助损失(干扰梯度难调)→无损失偏置法(DeepSeek,用b_i调度选择不污染梯度,已成标准)→结构性(细粒度+共享专家);关键澄清=省算力不省显存,all-to-all通信与显存才是真账单
summaryEn: "Mixture-of-Experts replaces a dense feed-forward layer with routed expert networks, separating total parameter capacity from per-token computation. The lesson covers top-k routing, expert collapse, capacity limits, token dropping, load-balancing strategies, shared experts, and the crucial tradeoff: sparse activation reduces compute but not model-weight memory or communication."
